name: Create Clean Branch
on:
  push:
    branches:
      - 'feature/**'
jobs:
  generate-clean-clone:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # pull-requests: write はもう不要なので削除！
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ブランチ名の変換（feature/ → clean/）
        id: branch_name
        run: |
          ORIGIN_BRANCH=${GITHUB_REF#refs/heads/}
          CLEAN_BRANCH=${ORIGIN_BRANCH/feature\//clean\/}
          echo "CLEAN_BRANCH=$CLEAN_BRANCH" >> $GITHUB_ENV

      - name: クローン作成 ＆ ゴミ削除 ＆ Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # クリーン用の新しいブランチを作成して移動
          git checkout -b ${{ env.CLEAN_BRANCH }}
          
          # お掃除
          find docs/99_見積書 -type f ! -name ".gitkeep" -exec rm -f {} +
          git add .
          
          # コミットとPush
          if ! git diff --staged --quiet; then
            git commit -m "chore: 🧹 ボットが自動生成したクリーンなブランチ"
          fi
          git push -f origin ${{ env.CLEAN_BRANCH }}
